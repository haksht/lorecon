<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 LoRa Attack Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html {
            height: auto;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 50px;
        }
        
        .header {
            background: rgba(0,0,0,0.4);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff3366;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255,51,102,0.5);
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected { background: #00ff88; }
        .status-dot.error { background: #ff3366; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .config-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .config-bar label { color: #888; font-size: 0.85rem; }
        
        .config-bar input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            width: 180px;
        }
        
        .config-bar button {
            background: #ff3366;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .config-bar button:hover { background: #ff4477; }
        .config-bar button:disabled { background: #555; cursor: not-allowed; }
        .config-bar button.connected { 
            background: #00aa66; 
            cursor: default;
        }
        .config-bar button.connected:hover { background: #00aa66; }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 400px;
            grid-template-rows: auto auto;
            gap: 15px;
            padding: 15px;
        }
        
        /* Responsive - stack on smaller screens */
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
            .replay-panel {
                grid-column: 1 / 3;
            }
            .map-panel {
                grid-column: 1 / 3;
            }
        }
        
        @media (max-width: 800px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .replay-panel, .map-panel, .attack-surface, .psk-panel {
                grid-column: 1;
            }
        }
        
        .panel {
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
        }
        
        .panel-header {
            background: rgba(255,51,102,0.2);
            padding: 10px 15px;
            font-weight: bold;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-content {
            padding: 15px;
            overflow-y: auto;
            max-height: 100%;
        }
        
        /* Attack Surface Panel */
        .attack-surface { grid-column: 1; grid-row: 1; }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #ff3366;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }
        
        .stat-card.success .stat-value { color: #00ff88; }
        .stat-card.warning .stat-value { color: #ffaa00; }
        
        /* PSK Cracking Panel */
        .psk-panel { grid-column: 2; grid-row: 1; }
        
        .psk-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .psk-bar .bar-fill {
            flex: 1;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .psk-bar .bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff3366, #ff6699);
            transition: width 0.5s ease;
        }
        
        .psk-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        
        .key-chip {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            color: #888;
        }
        
        .key-chip.cracked {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        
        /* Replay Slots Panel */
        .replay-panel { grid-column: 3; grid-row: 1 / 3; }
        
        .replay-slot {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #ff3366;
        }
        
        .replay-slot .slot-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .replay-slot .node-id {
            font-family: monospace;
            color: #ff6699;
        }
        
        .replay-slot .protocol {
            font-size: 0.75rem;
            color: #888;
        }
        
        .replay-slot .message {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #00ff88;
            margin-top: 8px;
            word-break: break-all;
        }
        
        .replay-btn {
            background: #ff3366;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        
        .replay-btn:hover { background: #ff4477; }
        
        /* GPS Map Panel */
        .map-panel { grid-column: 1 / 3; grid-row: 2; min-height: 400px; }
        
        #map {
            width: 100%;
            height: 400px;
            border-radius: 4px;
        }
        
        /* Anomalies Panel - overlays map */
        .anomaly-feed {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 350px;
            max-height: 200px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            border: 1px solid #ff3366;
            overflow: hidden;
            z-index: 1000;
        }
        
        .anomaly-item {
            padding: 10px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        
        .anomaly-item:last-child { border-bottom: none; }
        
        .anomaly-icon {
            font-size: 1.2rem;
        }
        
        .anomaly-content {
            flex: 1;
        }
        
        .anomaly-type {
            font-weight: bold;
            color: #ff6699;
            font-size: 0.85rem;
        }
        
        .anomaly-desc {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 2px;
        }
        
        .anomaly-time {
            font-size: 0.7rem;
            color: #666;
        }
        
        /* Live feed indicator */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: #ff3366;
        }
        
        .live-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ff3366;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        .empty-state .icon { font-size: 3rem; margin-bottom: 10px; }
        
        /* Map markers */
        .device-marker {
            background: #ff3366;
            border: 2px solid white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
        }
        
        .device-marker.decrypted {
            background: #00ff88;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 LoRa Attack Dashboard</h1>
        <div class="connection-status">
            <span class="live-indicator">LIVE</span>
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </div>
    
    <div class="config-bar">
        <label>Device IP:</label>
        <input type="text" id="deviceIP" value="172.20.10.3" placeholder="ESP32 IP address">
        <button id="connectBtn" onclick="connect()">Connect</button>
        <span id="lastUpdate" style="color: #666; font-size: 0.8rem; margin-left: auto;"></span>
    </div>
    
    <div class="dashboard">
        <!-- Attack Surface Stats -->
        <div class="panel attack-surface">
            <div class="panel-header">
                <span>⚔️ Attack Surface</span>
            </div>
            <div class="panel-content">
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="deviceCount">0</div>
                        <div class="stat-label">Devices Found</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-value" id="decryptedCount">0</div>
                        <div class="stat-label">Networks Cracked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="replayReady">0</div>
                        <div class="stat-label">Replay Slots</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-value" id="anomalyCount">0</div>
                        <div class="stat-label">Anomalies</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- PSK Cracking Status -->
        <div class="panel psk-panel">
            <div class="panel-header">
                <span>🔓 PSK Decryption</span>
                <span id="pskRate" style="font-size: 0.8rem; color: #888;">0% success</span>
            </div>
            <div class="panel-content">
                <div class="psk-bar">
                    <span style="font-size: 0.8rem; color: #888;">Progress:</span>
                    <div class="bar-fill">
                        <div class="bar-inner" id="pskProgress" style="width: 0%"></div>
                    </div>
                    <span id="pskAttempts" style="font-size: 0.8rem;">0</span>
                </div>
                <div style="margin-top: 15px;">
                    <div style="font-size: 0.8rem; color: #888; margin-bottom: 8px;">Default Keys (14 tested per packet):</div>
                    <div class="psk-keys" id="pskKeys"></div>
                </div>
            </div>
        </div>
        
        <!-- Replay Slots -->
        <div class="panel replay-panel">
            <div class="panel-header">
                <span>📡 Replay Attack Ready</span>
                <span id="slotCount" style="font-size: 0.8rem; color: #888;">0/10</span>
            </div>
            <div class="panel-content" id="replaySlots">
                <div class="empty-state">
                    <div class="icon">📦</div>
                    <div>No packets captured yet</div>
                </div>
            </div>
        </div>
        
        <!-- GPS Map -->
        <div class="panel map-panel" style="position: relative;">
            <div class="panel-header">
                <span>📍 Live GPS Track</span>
                <span id="gpsCount" style="font-size: 0.8rem; color: #888;">0 positions</span>
            </div>
            <div class="panel-content" style="padding: 0;">
                <div id="map"></div>
            </div>
            
            <!-- Anomaly Feed Overlay -->
            <div class="anomaly-feed" id="anomalyFeed" style="display: none;">
                <div class="panel-header" style="padding: 8px 12px;">
                    <span>⚠️ Anomalies</span>
                </div>
                <div id="anomalyList" style="max-height: 150px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let deviceIP = '172.20.10.3';
        let updateInterval = null;
        let map = null;
        let markers = {};
        let trails = {};
        let positions = {};
        
        // Initialize map
        function initMap() {
            map = L.map('map').setView([37.7749, -122.4194], 13); // Default to SF
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '©OpenStreetMap, ©CartoDB',
                maxZoom: 19
            }).addTo(map);
        }
        
        // Connect to device
        function connect() {
            deviceIP = document.getElementById('deviceIP').value.trim();
            if (!deviceIP) {
                alert('Please enter device IP');
                return;
            }
            
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('connectBtn').textContent = 'Connecting...';
            
            // Test connection with status endpoint
            fetch(`http://${deviceIP}/api/status`)
                .then(r => r.json())
                .then(data => {
                    setConnected(true);
                    startPolling();
                })
                .catch(err => {
                    setConnected(false);
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('connectBtn').textContent = 'Connect';
                    alert(`Failed to connect to ${deviceIP}\n\nMake sure:\n1. Your laptop is on same WiFi as ESP32\n2. Device IP is correct\n3. Device is powered on`);
                });
        }
        
        function setConnected(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('connectBtn');
            const ipInput = document.getElementById('deviceIP');
            
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = `Connected to ${deviceIP}`;
                btn.textContent = '✓ Connected';
                btn.className = 'connected';
                btn.disabled = true;
                ipInput.disabled = true;
            } else {
                dot.className = 'status-dot error';
                text.textContent = 'Disconnected';
                btn.textContent = 'Connect';
                btn.className = '';
                btn.disabled = false;
                ipInput.disabled = false;
                if (updateInterval) {
                    clearInterval(updateInterval);
                    updateInterval = null;
                }
            }
        }
        
        function startPolling() {
            if (updateInterval) clearInterval(updateInterval);
            
            // Initial fetch
            fetchAll();
            
            // Poll every 2 seconds
            updateInterval = setInterval(fetchAll, 2000);
        }
        
        async function fetchAll() {
            try {
                const [status, psk, replay, gps, anomalies] = await Promise.all([
                    fetch(`http://${deviceIP}/api/status`).then(r => r.json()),
                    fetch(`http://${deviceIP}/api/psk/stats`).then(r => r.json()),
                    fetch(`http://${deviceIP}/api/replay/slots`).then(r => r.json()),
                    fetch(`http://${deviceIP}/api/positions`).then(r => r.json()),
                    fetch(`http://${deviceIP}/api/anomalies`).then(r => r.json())
                ]);
                
                updateStatus(status);
                updatePSK(psk);
                updateReplaySlots(replay);
                updateMap(gps);
                updateAnomalies(anomalies);
                
                document.getElementById('lastUpdate').textContent = 
                    `Last update: ${new Date().toLocaleTimeString()}`;
                    
            } catch (err) {
                console.error('Fetch error:', err);
                setConnected(false);
            }
        }
        
        function updateStatus(data) {
            document.getElementById('deviceCount').textContent = data.devices || 0;
        }
        
        function updatePSK(data) {
            const attempts = data.attempts || 0;
            const successes = data.successes || 0;
            const rate = data.successRate || 0;
            const cracked = data.networksCracked || 0;
            
            document.getElementById('decryptedCount').textContent = cracked;
            document.getElementById('pskRate').textContent = `${rate.toFixed(1)}% success`;
            document.getElementById('pskAttempts').textContent = `${successes}/${attempts}`;
            
            // Progress bar (show relative to attempts, max 100)
            const progress = Math.min(100, (attempts / 100) * 100);
            document.getElementById('pskProgress').style.width = `${progress}%`;
            
            // Key chips
            const keysContainer = document.getElementById('pskKeys');
            keysContainer.innerHTML = '';
            
            const keyNames = [
                'Default', 'Admin', 'Test', 'Password', 'Secret',
                'Private', 'Channel', 'Group', 'Mesh', 'LoRa',
                'Radio', 'Net', 'Key', 'PSK'
            ];
            
            (data.keys || []).forEach((key, i) => {
                const chip = document.createElement('span');
                chip.className = 'key-chip' + (key.hits > 0 ? ' cracked' : '');
                chip.textContent = `#${i+1}${key.hits > 0 ? ` (${key.hits})` : ''}`;
                chip.title = keyNames[i] || `Key ${i+1}`;
                keysContainer.appendChild(chip);
            });
        }
        
        function updateReplaySlots(data) {
            const slots = data.packets || [];
            const container = document.getElementById('replaySlots');
            
            document.getElementById('replayReady').textContent = slots.length;
            document.getElementById('slotCount').textContent = `${slots.length}/${data.capacity || 10}`;
            
            if (slots.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <div>No packets captured yet</div>
                    </div>`;
                return;
            }
            
            container.innerHTML = slots.map((slot, i) => `
                <div class="replay-slot">
                    <div class="slot-header">
                        <span class="node-id">0x${slot.nodeId?.toString(16).toUpperCase().padStart(8, '0') || '????????'}</span>
                        <span class="protocol">${slot.protocol || 'Unknown'}</span>
                    </div>
                    <div style="font-size: 0.75rem; color: #666;">
                        ${slot.length || 0} bytes • ${slot.rssi?.toFixed(1) || '?'} dBm
                    </div>
                    ${slot.decryptedText ? `<div class="message">"${escapeHtml(slot.decryptedText)}"</div>` : ''}
                    <button class="replay-btn" onclick="replayPacket(${i + 1})">
                        ⚡ Transmit
                    </button>
                </div>
            `).join('');
        }
        
        function updateMap(data) {
            const positions_data = data.positions || [];
            document.getElementById('gpsCount').textContent = `${positions_data.length} positions`;
            
            if (positions_data.length === 0) return;
            
            let bounds = [];
            
            positions_data.forEach(pos => {
                if (!pos.latitude || !pos.longitude) return;
                
                const nodeId = pos.nodeId?.toString(16).toUpperCase().padStart(8, '0') || 'unknown';
                const latlng = [pos.latitude, pos.longitude];
                bounds.push(latlng);
                
                // Track position history for trails
                if (!positions[nodeId]) positions[nodeId] = [];
                positions[nodeId].push(latlng);
                
                // Update or create marker
                if (markers[nodeId]) {
                    markers[nodeId].setLatLng(latlng);
                } else {
                    const marker = L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: '#ff3366',
                        color: '#ffffff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <b>Node: 0x${nodeId}</b><br>
                        Lat: ${pos.latitude.toFixed(6)}<br>
                        Lon: ${pos.longitude.toFixed(6)}<br>
                        Alt: ${pos.altitude?.toFixed(1) || '?'}m
                    `);
                    
                    markers[nodeId] = marker;
                }
                
                // Draw trail
                if (positions[nodeId].length > 1) {
                    if (trails[nodeId]) {
                        map.removeLayer(trails[nodeId]);
                    }
                    trails[nodeId] = L.polyline(positions[nodeId], {
                        color: '#ff3366',
                        weight: 2,
                        opacity: 0.5,
                        dashArray: '5, 10'
                    }).addTo(map);
                }
            });
            
            // Fit map to show all positions
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
            }
        }
        
        function updateAnomalies(data) {
            const anomalies = data.anomalies || [];
            const container = document.getElementById('anomalyList');
            const feed = document.getElementById('anomalyFeed');
            
            document.getElementById('anomalyCount').textContent = data.unacknowledged || 0;
            
            if (anomalies.length === 0) {
                feed.style.display = 'none';
                return;
            }
            
            feed.style.display = 'block';
            
            const icons = {
                'packet_size': '📦',
                'relay_hops': '🔄',
                'rate_limit': '⚡',
                'rssi_variance': '📶',
                'replay': '🔁',
                'timing': '⏱️'
            };
            
            const typeNames = {
                'packet_size': 'Size Anomaly',
                'relay_hops': 'Excessive Hops',
                'rate_limit': 'Rate Violation',
                'rssi_variance': 'RSSI Anomaly',
                'replay': 'Replay Detected',
                'timing': 'Timing Anomaly'
            };
            
            // Show most recent 5
            container.innerHTML = anomalies.slice(-5).reverse().map(a => `
                <div class="anomaly-item">
                    <span class="anomaly-icon">${icons[a.type] || '⚠️'}</span>
                    <div class="anomaly-content">
                        <div class="anomaly-type">${typeNames[a.type] || a.type}</div>
                        <div class="anomaly-desc">${escapeHtml(a.description || '')}</div>
                        <div class="anomaly-time">Node: 0x${a.nodeId?.toString(16).toUpperCase().padStart(8, '0') || '?'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        async function replayPacket(slotIndex) {
            if (!confirm(`Transmit packet from slot ${slotIndex}?\n\nThis will replay the captured packet over LoRa.`)) {
                return;
            }
            
            try {
                const response = await fetch(`http://${deviceIP}/api/replay/transmit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `slotIndex=${slotIndex}&repeatCount=1`
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert('✅ Packet transmitted!');
                } else {
                    alert('❌ Transmit failed: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('❌ Error: ' + err.message);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            
            // Auto-connect if IP is set
            const savedIP = localStorage.getItem('loraDeviceIP');
            if (savedIP) {
                document.getElementById('deviceIP').value = savedIP;
            }
            
            // Save IP on change
            document.getElementById('deviceIP').addEventListener('change', (e) => {
                localStorage.setItem('loraDeviceIP', e.target.value);
            });
        });
    </script>
</body>
</html>
