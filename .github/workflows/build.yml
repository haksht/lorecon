name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Firmware build matrix ─────────────────────────────────────────────────
  # Builds every supported board target so a change that breaks one board's
  # compilation is caught before merge, even if the other board still works.
  firmware:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # Show all failures, not just the first
      matrix:
        env: [heltec_v3, heltec_v4, t3_s3, tbeam_supreme]

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install "platformio==6.1.19"

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }} -d ${{ github.workspace }}

  # ── Native unit tests ──────────────────────────────────────────────────────
  # Runs host-side tests (protocol parsing, security scorer, ring buffer,
  # SD guard) on every push. No hardware required.
  native-tests:
    name: Native unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-native-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-native-

      - name: Install PlatformIO
        run: pip install "platformio==6.1.19"

      - name: Run native tests
        run: pio test -e native -d ${{ github.workspace }}
