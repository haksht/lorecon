<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 LoRa Sniffer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 10px;
        }
        
        .header {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 20px; }
        
        .status { 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }
        
        .status-dot.connected { background: #44ff44; }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
        }
        
        .tab {
            padding: 12px 20px;
            background: #16213e;
            border: none;
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .tab.active {
            background: #4a90e2;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-card {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #4a90e2;
            margin: 8px 0;
        }
        
        .stat-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }
        
        .panel {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .panel h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #4a90e2;
        }
        
        .device-card {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .device-info {
            flex: 1;
        }
        
        .device-id {
            font-size: 14px;
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 4px;
        }
        
        .device-stats {
            font-size: 12px;
            color: #aaa;
        }
        
        .btn {
            padding: 8px 16px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn:hover {
            background: #3a7bc8;
        }
        
        .btn-danger {
            background: #ff4444;
        }
        
        .btn-danger:hover {
            background: #cc0000;
        }
        
        .packet-feed {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .packet {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        
        .packet-header {
            color: #4a90e2;
            margin-bottom: 4px;
        }
        
        .packet-message {
            color: #44ff44;
            margin-top: 4px;
            padding: 4px;
            background: rgba(68, 255, 68, 0.1);
            border-radius: 3px;
        }
        
        .no-data {
            color: #666;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 LoRa Sniffer</h1>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="tab" onclick="switchTab('devices')">Devices</button>
        <button class="tab" onclick="switchTab('activity')">Activity</button>
    </div>

    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Devices</div>
                <div class="stat-value" id="stat-devices">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Packets</div>
                <div class="stat-value" id="stat-packets">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Mode</div>
                <div class="stat-value" id="stat-mode" style="font-size:18px">Recon</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Uptime</div>
                <div class="stat-value" id="stat-uptime">0s</div>
            </div>
        </div>

        <div class="panel">
            <h2>📡 Live Packet Feed</h2>
            <div class="packet-feed" id="packet-feed">
                <p class="no-data">Waiting for packets...</p>
            </div>
        </div>
    </div>

    <!-- Devices Tab -->
    <div id="tab-devices" class="tab-content">
        <div class="panel">
            <h2>📱 Discovered Devices</h2>
            <div id="device-list">
                <p class="no-data">No devices discovered yet...</p>
            </div>
        </div>
    </div>

    <!-- Activity Tab -->
    <div id="tab-activity" class="tab-content">
        <div class="panel">
            <h2>📊 Statistics</h2>
            <div id="stats-content">
                <p class="no-data">Loading statistics...</p>
            </div>
        </div>
    </div>

    <script>
        // Simple WebSocket client
        let ws = null;
        let reconnectTimer = null;
        let packets = [];
        const MAX_PACKETS = 50;

        // Switch tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if (tabName === 'devices') loadDevices();
            if (tabName === 'activity') loadActivity();
        }

        // Connect WebSocket
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws`;
            console.log('Connecting to', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✓ Connected');
                document.getElementById('status-dot').classList.add('connected');
                document.getElementById('status-text').textContent = 'Connected';
                clearTimeout(reconnectTimer);
                loadStatus();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onclose = () => {
                console.log('✗ Disconnected');
                document.getElementById('status-dot').classList.remove('connected');
                document.getElementById('status-text').textContent = 'Disconnected';
                reconnectTimer = setTimeout(connectWebSocket, 2000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Handle WebSocket messages
        function handleMessage(data) {
            if (data.type === 'packet') {
                handlePacket(data);
            } else if (data.type === 'status') {
                updateStats(data.data);
            }
        }

        // Handle packet update
        function handlePacket(packet) {
            // Don't update packet count locally - let loadStatus() handle it
            // This prevents race conditions with server updates
            
            // Add to feed
            packets.unshift(packet);
            if (packets.length > MAX_PACKETS) packets.pop();
            
            // Render feed
            const feed = document.getElementById('packet-feed');
            feed.innerHTML = packets.map(p => `
                <div class="packet">
                    <div class="packet-header">
                        ${p.nodeId} | ${p.protocol} | RSSI: ${p.rssi.toFixed(1)} dBm | SNR: ${p.snr.toFixed(1)} dB
                    </div>
                    ${p.message ? `<div class="packet-message">📧 ${p.message}</div>` : ''}
                </div>
            `).join('');
        }

        // Load status
        async function loadStatus() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                updateStats(data);
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        // Update stats
        function updateStats(data) {
            if (data.devices !== undefined) {
                document.getElementById('stat-devices').textContent = data.devices;
            }
            if (data.totalPackets !== undefined) {
                document.getElementById('stat-packets').textContent = data.totalPackets;
            }
            if (data.mode) {
                const mode = data.mode.replace('MODE_', '').replace('_', ' ');
                document.getElementById('stat-mode').textContent = mode.charAt(0) + mode.slice(1).toLowerCase();
            }
            if (data.uptime !== undefined) {
                const hours = Math.floor(data.uptime / 3600);
                const mins = Math.floor((data.uptime % 3600) / 60);
                document.getElementById('stat-uptime').textContent = hours > 0 ? 
                    `${hours}h ${mins}m` : `${mins}m`;
            }
        }

        // Load devices
        async function loadDevices() {
            try {
                const resp = await fetch('/api/devices');
                const data = await resp.json();
                
                const list = document.getElementById('device-list');
                if (data.devices && data.devices.length > 0) {
                    list.innerHTML = data.devices.map((d, i) => `
                        <div class="device-card">
                            <div class="device-info">
                                <div class="device-id">#${i+1} ${d.nodeId}</div>
                                <div class="device-stats">
                                    ${d.protocol} | ${d.frequency.toFixed(3)} MHz | 
                                    RSSI: ${d.rssi.toFixed(1)} dBm | 
                                    Packets: ${d.packetCount}
                                </div>
                            </div>
                            <button class="btn" onclick="targetDevice('${d.nodeId}')">Target</button>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p class="no-data">No devices discovered yet...</p>';
                }
            } catch (e) {
                console.error('Failed to load devices:', e);
            }
        }

        // Target device
        async function targetDevice(nodeId) {
            try {
                const resp = await fetch('/api/capture/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nodeId: nodeId.replace('0x', '')})
                });
                const data = await resp.json();
                alert(data.message || 'Capture started');
                loadStatus();
            } catch (e) {
                alert('Failed to start capture: ' + e.message);
            }
        }

        // Load activity stats
        async function loadActivity() {
            try {
                const resp = await fetch('/api/statistics');
                const data = await resp.json();
                
                const content = document.getElementById('stats-content');
                if (data.statistics) {
                    const s = data.statistics;
                    content.innerHTML = `
                        <div style="line-height: 1.8;">
                            <p><strong>Total Devices:</strong> ${s.totalDevices || 0}</p>
                            <p><strong>Total Packets:</strong> ${s.totalPackets || 0}</p>
                            <p><strong>Average RSSI:</strong> ${(s.avgRSSI || 0).toFixed(1)} dBm</p>
                            <p><strong>Average SNR:</strong> ${(s.avgSNR || 0).toFixed(1)} dB</p>
                            <hr style="margin: 15px 0; border-color: #333;">
                            <h3 style="color: #4a90e2; margin-bottom: 8px;">Protocol Distribution</h3>
                            ${Object.entries(s.protocolDistribution || {}).map(([k,v]) => 
                                `<p><strong>${k}:</strong> ${v}</p>`
                            ).join('')}
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Failed to load activity:', e);
            }
        }

        // Initialize
        connectWebSocket();
        setInterval(loadStatus, 2000);  // Refresh every 2 seconds for responsive updates
    </script>
</body>
</html>
