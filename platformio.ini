; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = firmware/src
default_envs = heltec_v3

; ============================================================================
; Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262 + OLED)
; ============================================================================
[env:heltec_v3]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = +<*> -<main_complex.cpp> -<main_old_*.cpp> -<test_*.cpp> -<unit_tests.cpp> -<psk_decryption_clean.cpp> -<psk_decryption_nanopb.cpp> -<*.backup> -<archive/> -<repositories/node_tracker.cpp>
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DBOARD_HELTEC_V3
	-DHAS_OLED_DISPLAY
	-DPRODUCTION_BUILD
	-DCONFIG_LITTLEFS_FOR_IDF_3_2
	-DCONFIG_ESP32S3_BROWNOUT_DET_LVL_SEL_7=1
	-O2
	-Wall
	-Wextra
	-Wno-unused-function
	-Wno-unused-variable
	-fstack-protector
; Treat warnings as errors only for our source files (not libraries)
build_src_flags = -Werror
lib_deps =
	jgromes/RadioLib@^6.4.2
	bblanchon/ArduinoJson@^7.0.4
	olikraus/U8g2@^2.35.9
	esphome/ESPAsyncWebServer-esphome@^3.1.0
	esphome/AsyncTCP-esphome@^2.1.3

; ============================================================================
; LilyGO T3-S3 V1.2/V1.3 (ESP32-S3FH4R2 + SX1262 + OLED + SD Card)
; NOTE: T3-S3 has 4MB flash and 2MB Quad PSRAM (NOT 8MB/16MB), native USB-CDC
; Board uses esp32-s3-devkitc-1 as base but flash_size overridden to 4MB
; ============================================================================
[env:t3_s3]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; T3-S3 has 4MB flash - must set explicitly
board_build.flash_size = 4MB
board_build.partitions = default.csv
board_upload.flash_size = 4MB
build_src_filter = +<*> -<main_complex.cpp> -<main_old_*.cpp> -<test_*.cpp> -<unit_tests.cpp> -<psk_decryption_clean.cpp> -<psk_decryption_nanopb.cpp> -<*.backup> -<archive/> -<repositories/node_tracker.cpp>
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_T3_S3
	-DHAS_OLED_DISPLAY
	-DHAS_SD_CARD
	-DPRODUCTION_BUILD
	-DCONFIG_LITTLEFS_FOR_IDF_3_2
	-DCONFIG_ESP32S3_BROWNOUT_DET_LVL_SEL_7=1
	-O2
	-Wall
	-Wextra
	-Wno-unused-function
	-Wno-unused-variable
	-fstack-protector
; Treat warnings as errors only for our source files (not libraries)
build_src_flags = -Werror
lib_deps =
	jgromes/RadioLib@^6.4.2
	bblanchon/ArduinoJson@^7.0.4
	olikraus/U8g2@^2.35.9
	esphome/ESPAsyncWebServer-esphome@^3.1.0
	esphome/AsyncTCP-esphome@^2.1.3

; ============================================================================
; Native (host) unit tests — runs on PC, no hardware needed
; Usage: pio test -e native
; ============================================================================
[env:native]
platform = native
test_framework = unity
build_flags =
	-DBOARD_HELTEC_V3
	-std=c++17
	-I firmware/src
	-I test/native/stubs
