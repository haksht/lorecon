; ESP32 LoRa Packet Sniffer
; Simple LoRa packet capture tool for learning and experimentation
; Hardware: ESP32-S3 + SX1262 (like Heltec WiFi LoRa 32 V3)

; ESP32 LoRa Packet Sniffer - Dual Track Build System
; Choose between full-featured version or simple educational version

[platformio]
src_dir = firmware/src
default_envs = default

; =============================================================================
; 🎯 DEFAULT - Full-Featured Production Security Tool
; =============================================================================
; Complete reconnaissance platform with production-grade features:
; • PSK decryption with 5 default Meshtastic keys
; • Hardware stress testing framework  
; • Interactive device targeting and capture modes
; • Protocol analysis and packet replay
; • Clean state management architecture
; • Production error handling and recovery
; • Command pattern dispatch system
; • Comprehensive logging and diagnostics
;
; Usage: pio run (default)
;
[env:default]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
board_build.filesystem = littlefs

; Exclude simple version, backup files, test files, alternate implementations, and archive directory
build_src_filter = +<*> -<main_realistic.cpp> -<main_complex.cpp> -<main_old_*.cpp> -<test_*.cpp> -<unit_tests.cpp> -<psk_decryption_clean.cpp> -<psk_decryption_nanopb.cpp> -<*.backup> -<archive/>

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Core Feature Flags
    -DENABLE_PSK_TESTING           ; Test 5 default Meshtastic PSKs (AES-256 decryption)
    -DENABLE_STRESS_TESTING        ; Hardware validation framework for attack surface analysis
    -DPRODUCTION_BUILD            ; Production error handling and watchdog timer
    -DERROR_LOGGING_ENABLED       ; Comprehensive error recovery system
    ; Optimization flags for production
    -O2
    -Wall
    -Wextra
    -Werror=return-type
    -Werror=format
    ; Suppress warnings from library code
    -Wno-unused-function
    -Wno-unused-variable

lib_deps =
    jgromes/RadioLib@^6.4.2
    bblanchon/ArduinoJson@^7.0.4
    olikraus/U8g2@^2.35.9

; =============================================================================
; 📚 SIMPLE - Clean Learning Version (300 lines)
; =============================================================================
; Streamlined 300-line implementation perfect for:
; • Learning LoRa protocol basics
; • Understanding packet capture concepts
; • Educational demonstrations
; • Simple frequency scanning without complexity
; • No advanced features or state management
;
; Usage: pio run -e simple
;
[env:simple]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
board_build.filesystem = littlefs

; Use main_realistic.cpp for simple build, exclude research platform modules
build_src_filter = +<main_realistic.cpp> +<data_structures.h> -<main.cpp> -<main_complex.cpp> -<recon_state.cpp> -<user_interface.cpp> -<psk_decryption_simple.cpp> -<hardware_stress_tester.cpp> -<test_*.cpp>

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Simple version has no advanced features enabled

lib_deps =
    jgromes/RadioLib@^6.4.2
    bblanchon/ArduinoJson@^7.0.4

; =============================================================================
; 🔬 OLED_TEST - Hardware Verification
; =============================================================================
; Minimal test using Adafruit_SSD1306 to verify OLED hardware presence
; Use this to definitively determine if OLED is populated on your board
;
; Usage: pio run -e oled_test -t upload && pio device monitor -e oled_test
;
[env:oled_test]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; Only build the simple OLED test file
build_src_filter = -<*> +<test_oled_simple.cpp>

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.3

; =============================================================================
; 🔬 ADVANCED_OLED_TEST - Try Multiple Configurations
; =============================================================================
; Tests every possible pin combination and initialization sequence
; Use this when simple test fails but you know OLED exists
;
; Usage: pio run -e advanced_oled_test -t upload && pio device monitor -e advanced_oled_test
;
[env:advanced_oled_test]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; Only build the advanced test
build_src_filter = -<*> +<test_oled_advanced.cpp>

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    olikraus/U8g2@^2.35.9

