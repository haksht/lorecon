; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = C:\Users\tim\AppData\Local\Programs\Microsoft VS Code\firmware\src
default_envs = default

[env:default]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = +<*> -<main_realistic.cpp> -<main_complex.cpp> -<main_old_*.cpp> -<test_*.cpp> -<unit_tests.cpp> -<psk_decryption_clean.cpp> -<psk_decryption_nanopb.cpp> -<*.backup> -<archive/>
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DENABLE_PSK_TESTING
	-DENABLE_STRESS_TESTING
	-DPRODUCTION_BUILD
	-DERROR_LOGGING_ENABLED
	-O2
	-Wall
	-Wextra
	-Werror=return-type
	-Werror=format
	-Wno-unused-function
	-Wno-unused-variable
lib_deps = 
	jgromes/RadioLib@^6.4.2
	bblanchon/ArduinoJson@^7.0.4
	olikraus/U8g2@^2.35.9

[env:simple]
platform = espressif32@^6.4.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = +<main_realistic.cpp> +<data_structures.h> -<main.cpp> -<main_complex.cpp> -<recon_state.cpp> -<user_interface.cpp> -<psk_decryption_simple.cpp> -<hardware_stress_tester.cpp> -<test_*.cpp>
build_flags = -DARDUINO_USB_CDC_ON_BOOT=0
lib_deps = 
	jgromes/RadioLib@^6.4.2
	bblanchon/ArduinoJson@^7.0.4
